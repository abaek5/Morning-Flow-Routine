<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Morning Flow">
<title>Morning Flow</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap');
:root{
  --sage:#8aab8a;--sage-light:#b8ccb8;--sage-dark:#4a7a4a;
  --cream:#f5f0e8;--warm:#e8dfd0;--text:#2a2420;--text-muted:#6b5e54;
  --card:rgba(255,255,255,0.65);
  --st:env(safe-area-inset-top,20px);--sb:env(safe-area-inset-bottom,16px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--text);min-height:100vh;min-height:-webkit-fill-available;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 10%,rgba(138,171,138,.18) 0%,transparent 55%),radial-gradient(ellipse at 80% 90%,rgba(196,149,74,.12) 0%,transparent 50%);pointer-events:none;z-index:0}
.screen{display:none;flex-direction:column;min-height:100vh;min-height:-webkit-fill-available;position:relative;z-index:1}
.screen.active{display:flex}

/* ── HOME ── */
#home{padding:calc(var(--st) + 16px) 22px calc(var(--sb) + 20px);gap:14px;justify-content:space-between}
.greeting{font-family:'DM Serif Display',serif;font-size:clamp(34px,9vw,50px);line-height:1.08}
.greeting em{font-style:italic;color:var(--sage-dark)}
.subhead{font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--text-muted);margin-top:4px;font-weight:300}
.view-toggle{display:flex;background:rgba(255,255,255,.5);border:1px solid rgba(138,171,138,.25);border-radius:12px;padding:3px;gap:3px}
.vt-btn{flex:1;border:none;background:none;border-radius:10px;padding:9px 6px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;color:var(--text-muted);cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:5px}
.vt-btn.active{background:var(--sage-dark);color:#fff}

/* reorder hint */
.reorder-hint{font-size:11px;color:var(--text-muted);text-align:center;opacity:.7;margin-top:-4px}

.exercise-list{display:flex;flex-direction:column;gap:7px}
.ex-pill{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid rgba(138,171,138,.2);border-radius:13px;padding:11px 12px;transition:all .18s;-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);cursor:default;user-select:none;-webkit-user-select:none;touch-action:none}
.ex-pill.dragging{opacity:.4;transform:scale(.98)}
.ex-pill.drag-over{border-color:var(--sage-dark);background:rgba(74,122,74,.08)}
.drag-handle{font-size:16px;color:var(--text-muted);cursor:grab;padding:2px 4px;opacity:.5;touch-action:none;flex-shrink:0}
.drag-handle:active{cursor:grabbing}
.ex-num{font-family:'DM Serif Display',serif;font-size:17px;font-style:italic;color:var(--sage-dark);min-width:22px}
.ex-info{flex:1;min-width:0}
.ex-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ex-dur{font-size:11px;color:var(--text-muted);margin-top:1px;font-weight:300}
.ex-actions{display:flex;align-items:center;gap:3px}
.icon-btn{background:none;border:none;cursor:pointer;width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--text-muted);transition:all .15s}
.icon-btn:active{background:rgba(0,0,0,.08)}
.home-footer{}
.total-row{display:flex;align-items:baseline;justify-content:center;gap:6px;margin-bottom:12px}
.total-num{font-family:'DM Serif Display',serif;font-size:42px;color:var(--sage-dark);line-height:1}
.total-label{font-size:13px;color:var(--text-muted);font-weight:300}
.start-btn{width:100%;background:var(--sage-dark);color:var(--cream);border:none;border-radius:17px;padding:19px;font-family:'DM Serif Display',serif;font-size:21px;font-style:italic;cursor:pointer;transition:all .18s}
.start-btn:active{transform:scale(.97);background:var(--sage)}

/* ── WORKOUT LIST ── */
#workout-list{padding:calc(var(--st) + 10px) 0 calc(var(--sb) + 14px)}
.wl-header{display:flex;align-items:center;justify-content:space-between;padding:0 18px 12px}
.back-btn{background:none;border:none;cursor:pointer;font-size:13px;color:var(--text-muted);font-weight:500;display:flex;align-items:center;gap:4px;padding:8px 0}
.prog-text{font-size:13px;color:var(--text-muted)}
.prog-track{height:3px;margin:0 18px 16px;background:rgba(138,171,138,.15);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:var(--sage-dark);border-radius:2px;transition:width .5s ease}
.wl-scroll{flex:1;overflow-y:auto;padding:0 14px;display:flex;flex-direction:column;gap:9px}
.wl-card{border-radius:15px;border:1.5px solid rgba(138,171,138,.2);background:var(--card);-webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px);overflow:hidden;transition:border-color .2s}
.wl-card.active-ex{border-color:var(--sage-dark)}
.wl-card.done-ex{opacity:.42}
.wl-card-header{display:flex;align-items:center;gap:11px;padding:13px 15px}
.wl-num{font-family:'DM Serif Display',serif;font-size:21px;font-style:italic;color:var(--sage-dark);min-width:26px}
.wl-info{flex:1}
.wl-name{font-size:14px;font-weight:500}
.wl-dur{font-size:11px;color:var(--text-muted);margin-top:2px;font-weight:300}
.wl-timer{display:none;padding:0 15px 14px}
.wl-card.active-ex .wl-timer{display:block}
.mini-ring-wrap{display:flex;align-items:center;gap:14px}
.mini-ring{position:relative;width:68px;height:68px;flex-shrink:0}
.mini-ring svg{transform:rotate(-90deg)}
.mini-ring-num{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.mini-ring-num span{font-family:'DM Serif Display',serif;font-size:19px;color:var(--text);line-height:1}
.mini-ring-num small{font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--text-muted)}
.mini-controls{display:flex;flex-direction:column;gap:6px;flex:1}
.mini-ctrl-row{display:flex;gap:6px}
.mini-btn{flex:1;border:none;border-radius:9px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;padding:9px;transition:all .15s}
.mini-btn:active{transform:scale(.96)}
.mb-pause{background:var(--warm);color:var(--text);border:1px solid rgba(0,0,0,.08)}
.mb-next{background:var(--sage-dark);color:#fff}
.mb-video{background:rgba(138,171,138,.15);color:var(--sage-dark);font-size:11px;display:flex;align-items:center;justify-content:center;gap:4px}
.mb-skip{background:none;color:var(--text-muted);font-size:11px;border:1px solid rgba(0,0,0,.08)}
.wl-desc{font-size:11px;color:var(--text-muted);line-height:1.6;font-weight:300;margin-top:7px}

/* ── WORKOUT FOCUS ── */
#workout-focus{padding:0;overflow:hidden}
.focus-top{flex:0 0 42%;position:relative;background:#1a2a1a;overflow:hidden;display:flex;align-items:center;justify-content:center;transition:background .6s}
.video-thumb{position:absolute;inset:0;background-size:cover;background-position:center;opacity:.72}
.video-thumb::after{content:'';position:absolute;inset:0;background:linear-gradient(to bottom,transparent 35%,rgba(0,0,0,.65) 100%)}
.video-play-btn{position:relative;z-index:2;width:54px;height:54px;border-radius:50%;background:rgba(255,255,255,.22);border:2px solid rgba(255,255,255,.5);display:flex;align-items:center;justify-content:center;cursor:pointer;-webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px);transition:all .18s}
.video-play-btn:active{transform:scale(.91)}
.play-tri{width:0;height:0;border-style:solid;border-width:9px 0 9px 17px;border-color:transparent transparent transparent white;margin-left:3px}
.focus-nav{position:absolute;top:0;left:0;right:0;z-index:3;padding:calc(var(--st) + 8px) 16px 8px;display:flex;align-items:center;justify-content:space-between}
.focus-back{background:rgba(0,0,0,.3);border:none;color:white;font-size:13px;font-weight:500;padding:7px 13px;border-radius:20px;cursor:pointer;-webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px)}
.focus-plabel{background:rgba(0,0,0,.3);color:white;font-size:12px;padding:6px 11px;border-radius:20px;-webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px)}
.focus-ex-label{position:absolute;bottom:13px;left:16px;right:16px;z-index:3}
.focus-ex-name{font-family:'DM Serif Display',serif;font-size:clamp(18px,4.5vw,25px);color:white;line-height:1.15;text-shadow:0 1px 10px rgba(0,0,0,.45)}
.focus-bottom{flex:1;display:flex;flex-direction:column;padding:14px 18px calc(var(--sb) + 8px);gap:11px;overflow:hidden}
.dot-prog{display:flex;align-items:center;justify-content:center;gap:6px;flex-shrink:0}
.dot{width:7px;height:7px;border-radius:50%;background:rgba(138,171,138,.3);transition:all .3s}
.dot.done{background:var(--sage-light)}
.dot.current{background:var(--sage-dark);transform:scale(1.3)}
.focus-timer-row{display:flex;align-items:center;gap:16px}
.focus-ring-wrap{position:relative;width:92px;height:92px;flex-shrink:0}
.focus-ring-svg{transform:rotate(-90deg)}
.focus-ring-time{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.focus-ring-num{font-family:'DM Serif Display',serif;font-size:29px;color:var(--text);line-height:1}
.focus-ring-lbl{font-size:9px;text-transform:uppercase;letter-spacing:.12em;color:var(--text-muted);margin-top:2px}
.focus-desc{flex:1;font-size:12px;color:var(--text-muted);line-height:1.6;font-weight:300;overflow:hidden;display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical}
.focus-controls{display:flex;flex-direction:column;gap:6px}
.focus-ctrl-row{display:flex;gap:6px}
.focus-btn{flex:1;border:none;border-radius:12px;cursor:pointer;padding:13px;transition:all .15s}
.focus-btn:active{transform:scale(.96)}
.fb-pause{background:var(--warm);color:var(--text);border:1px solid rgba(0,0,0,.08);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500}
.fb-next{background:var(--sage-dark);color:#fff;flex:2;font-family:'DM Serif Display',serif;font-size:16px;font-style:italic}
.fb-video{background:rgba(138,171,138,.15);color:var(--sage-dark);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;display:flex;align-items:center;justify-content:center;gap:4px}
.fb-skip{background:none;border:1px solid rgba(0,0,0,.1);color:var(--text-muted);font-family:'DM Sans',sans-serif;font-size:12px}
.focus-up-next{display:flex;align-items:center;gap:9px;padding:9px 13px;background:rgba(255,255,255,.4);border-radius:11px;border:1px solid rgba(138,171,138,.15);flex-shrink:0}
.fun-label{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--text-muted);min-width:48px}
.fun-name{font-size:12px;font-weight:500;color:var(--text)}

/* ── REST ── */
.rest-overlay{display:none;position:fixed;inset:0;z-index:80;flex-direction:column;align-items:center;justify-content:center;background:rgba(74,122,74,.93);color:white;text-align:center;-webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px)}
.rest-overlay.open{display:flex}
.rest-title{font-family:'DM Serif Display',serif;font-size:30px;font-style:italic;margin-bottom:5px}
.rest-next{font-size:13px;opacity:.75;margin-bottom:24px}
.rest-count{font-family:'DM Serif Display',serif;font-size:84px;line-height:1}
.rest-skip-btn{margin-top:24px;background:rgba(255,255,255,.2);border:none;color:white;padding:11px 26px;border-radius:12px;font-size:14px;cursor:pointer}

/* ── COMPLETE ── */
#complete{align-items:center;justify-content:center;padding:40px 26px;text-align:center}
.complete-icon{font-size:60px;animation:bloom .6s ease-out;margin-bottom:16px}
@keyframes bloom{from{transform:scale(.4);opacity:0}to{transform:scale(1);opacity:1}}
.complete-title{font-family:'DM Serif Display',serif;font-size:38px;font-style:italic;color:var(--sage-dark);line-height:1.1;margin-bottom:9px}
.complete-sub{font-size:14px;color:var(--text-muted);font-weight:300;line-height:1.65}
.complete-stats{display:flex;gap:26px;margin:28px 0;padding:20px 26px;background:rgba(255,255,255,.6);border-radius:18px;border:1px solid rgba(138,171,138,.2)}
.stat{display:flex;flex-direction:column;align-items:center}
.stat-num{font-family:'DM Serif Display',serif;font-size:32px;color:var(--text)}
.stat-label{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted);margin-top:3px}
.done-btn{width:100%;background:var(--sage-dark);color:var(--cream);border:none;border-radius:17px;padding:19px;font-family:'DM Serif Display',serif;font-size:20px;font-style:italic;cursor:pointer;transition:all .18s}
.done-btn:active{transform:scale(.97)}

/* ── EDIT MODAL ── */
.modal-overlay{display:none;position:fixed;inset:0;z-index:100;background:rgba(42,36,32,.5);align-items:flex-end;-webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px)}
.modal-overlay.open{display:flex}
.modal{width:100%;background:var(--cream);border-radius:22px 22px 0 0;padding:24px 20px calc(var(--sb) + 20px)}
.modal-title{font-family:'DM Serif Display',serif;font-size:19px;font-style:italic;margin-bottom:14px}
.modal label{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted);display:block;margin-bottom:5px}
.modal input{width:100%;padding:12px 14px;border:1.5px solid rgba(138,171,138,.35);border-radius:11px;font-size:16px;font-family:'DM Sans',sans-serif;background:white;color:var(--text);margin-bottom:12px;outline:none}
.modal input:focus{border-color:var(--sage-dark)}
.modal-btns{display:flex;gap:9px;margin-top:5px}
.modal-cancel{flex:1;padding:13px;border-radius:13px;border:1px solid rgba(0,0,0,.12);background:var(--warm);font-family:'DM Sans',sans-serif;font-size:14px;cursor:pointer}
.modal-save{flex:2;padding:13px;border-radius:13px;border:none;background:var(--sage-dark);color:var(--cream);font-family:'DM Serif Display',serif;font-size:16px;font-style:italic;cursor:pointer}

/* ── CHIME TOAST ── */
.chime-toast{position:fixed;top:calc(var(--st) + 12px);left:50%;transform:translateX(-50%) translateY(-80px);background:rgba(74,122,74,.92);color:white;font-size:13px;padding:9px 20px;border-radius:20px;z-index:200;transition:transform .3s ease;white-space:nowrap;-webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px)}
.chime-toast.show{transform:translateX(-50%) translateY(0)}

/* ── VOICEOVER TOGGLE ── */
.vo-btn{display:flex;align-items:center;gap:6px;background:rgba(0,0,0,.28);border:none;color:white;font-size:12px;font-weight:500;padding:6px 11px;border-radius:20px;cursor:pointer;-webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px);transition:all .2s;font-family:'DM Sans',sans-serif}
.vo-btn.vo-on{background:rgba(74,122,74,.7);border:1px solid rgba(255,255,255,.3)}
.vo-btn .vo-icon{font-size:14px;line-height:1}
.vo-speaking .focus-desc{color:var(--sage-dark)}
.vo-bar{display:flex;align-items:center;gap:3px;height:12px}
.vo-bar span{display:block;width:2.5px;border-radius:2px;background:rgba(255,255,255,.8);animation:voPulse 1s ease-in-out infinite}
.vo-bar span:nth-child(1){height:4px;animation-delay:0s}
.vo-bar span:nth-child(2){height:10px;animation-delay:.15s}
.vo-bar span:nth-child(3){height:7px;animation-delay:.3s}
.vo-bar span:nth-child(4){height:12px;animation-delay:.1s}
.vo-bar span:nth-child(5){height:5px;animation-delay:.22s}
@keyframes voPulse{0%,100%{transform:scaleY(.4)}50%{transform:scaleY(1)}}
</style>
</head>
<body>

<!-- HOME -->
<div id="home" class="screen active">
  <div>
    <div class="greeting">Good<br><em>morning.</em></div>
    <div class="subhead">Lymphatic morning flow · 8 exercises</div>
  </div>

  <div class="view-toggle">
    <button class="vt-btn active" id="vtList" onclick="setMode('list')">≡&nbsp; List view</button>
    <button class="vt-btn" id="vtFocus" onclick="setMode('focus')">◎&nbsp; Focus view</button>
  </div>

  <div>
    <div class="exercise-list" id="exerciseList"></div>
    <div class="reorder-hint">⠿ drag to reorder</div>
  </div>

  <div class="home-footer">
    <div class="total-row">
      <div class="total-num" id="totalNum">8</div>
      <div class="total-label">minutes total</div>
    </div>
    <button class="start-btn" onclick="startWorkout()">Begin your morning</button>
  </div>
</div>

<!-- WORKOUT: LIST -->
<div id="workout-list" class="screen">
  <div class="wl-header">
    <button class="back-btn" onclick="endWorkout()">← Home</button>
    <span class="prog-text" id="wlProg">1 of 8</span>
  </div>
  <div class="prog-track"><div class="prog-fill" id="wlFill" style="width:0%"></div></div>
  <div class="wl-scroll" id="wlScroll"></div>
</div>

<!-- WORKOUT: FOCUS -->
<div id="workout-focus" class="screen">
  <div class="focus-top" id="focusTop">
    <div class="video-thumb" id="videoThumb"></div>
    <div class="focus-nav">
      <button class="focus-back" onclick="endWorkout()">← Home</button>
      <div style="display:flex;align-items:center;gap:8px">
        <button class="vo-btn" id="voBtn" onclick="toggleVoiceover()">
          <span class="vo-icon" id="voIcon">🔇</span>
          <span id="voBtnLabel">Voiceover</span>
        </button>
        <span class="focus-plabel" id="focusPLabel">1 of 8</span>
      </div>
    </div>
    <div class="focus-ex-label">
      <div class="focus-ex-name" id="focusName">Exercise</div>
    </div>
    <button class="video-play-btn" onclick="openVideo()">
      <div class="play-tri"></div>
    </button>
  </div>
  <div class="focus-bottom">
    <div class="dot-prog" id="dotProg"></div>
    <div class="focus-timer-row">
      <div class="focus-ring-wrap">
        <svg class="focus-ring-svg" width="92" height="92" viewBox="0 0 92 92">
          <circle fill="none" stroke="rgba(138,171,138,.15)" stroke-width="7" cx="46" cy="46" r="38"/>
          <circle id="focusRing" fill="none" stroke="#4a7a4a" stroke-width="7" stroke-linecap="round" cx="46" cy="46" r="38"/>
        </svg>
        <div class="focus-ring-time">
          <div class="focus-ring-num" id="focusTime">60</div>
          <div class="focus-ring-lbl">sec</div>
        </div>
      </div>
      <div class="focus-desc" id="focusDesc">Description.</div>
    </div>
    <div class="focus-controls">
      <div class="focus-ctrl-row">
        <button class="focus-btn fb-pause" id="focusPauseBtn" onclick="toggleFocusPause()">Pause</button>
        <button class="focus-btn fb-next" onclick="focusNext()">Next →</button>
      </div>
      <div class="focus-ctrl-row">
        <button class="focus-btn fb-video" onclick="openVideo()">▶ Watch example video</button>
        <button class="focus-btn fb-skip" onclick="focusSkip()">Skip</button>
      </div>
    </div>
    <div class="focus-up-next" id="focusUpNext">
      <span class="fun-label">Up next</span>
      <span class="fun-name" id="focusUpNextName">—</span>
    </div>
  </div>
</div>

<!-- COMPLETE -->
<div id="complete" class="screen">
  <div class="complete-icon">🌿</div>
  <div class="complete-title">Flow complete.</div>
  <div class="complete-sub">Your lymphatic system is awake.<br>Have a wonderful day.</div>
  <div class="complete-stats">
    <div class="stat"><div class="stat-num" id="statEx">8</div><div class="stat-label">exercises</div></div>
    <div class="stat"><div class="stat-num" id="statMin">—</div><div class="stat-label">minutes</div></div>
  </div>
  <button class="done-btn" onclick="goHome()">Done</button>
</div>

<!-- REST OVERLAY -->
<div class="rest-overlay" id="restOverlay">
  <div class="rest-title">Rest</div>
  <div class="rest-next" id="restNext">Next: —</div>
  <div class="rest-count" id="restCount">5</div>
  <button class="rest-skip-btn" onclick="skipRest()">Skip rest →</button>
</div>

<!-- EDIT MODAL -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <div class="modal-title" id="editTitle">Edit</div>
    <label>Duration (seconds)</label>
    <input type="number" id="editDur" min="10" max="600" step="5">
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeModal()">Cancel</button>
      <button class="modal-save" onclick="saveModal()">Save</button>
    </div>
  </div>
</div>

<!-- CHIME TOAST -->
<div class="chime-toast" id="chimeToast">🔔 Next exercise</div>

<script>
/* ═══════════════════════════════════════════
   DATA
═══════════════════════════════════════════ */
const EX_BASE = [
  {name:"Deep Diaphragmatic Breathing",   desc:"Inhale deeply into your belly to stimulate the major lymph vessels and nodes in the abdomen and trunk. One hand on belly, one on chest — belly rises first.",dur:60,video:"https://www.youtube.com/watch?v=9jpchJcKivk",  thumb:"https://img.youtube.com/vi/9jpchJcKivk/mqdefault.jpg",  bg:"#1e3320"},
  {name:"Body Bouncing / Lymphatic Hops", desc:"Gently raise onto your toes and drop your heels, or bounce softly. This rebounding motion stimulates whole-body lymphatic circulation.",                   dur:60,video:"https://www.youtube.com/watch?v=BPdTSkt0DBE",  thumb:"https://img.youtube.com/vi/BPdTSkt0DBE/mqdefault.jpg",  bg:"#1a2e18"},
  {name:"Body Waves",                     desc:"Undulate and mobilize your spine while raising and lowering your arms. Releases tension and massages internal organs to encourage fluid movement.",        dur:60,video:"https://www.youtube.com/watch?v=kBFg1mgCe0A",  thumb:"https://img.youtube.com/vi/kBFg1mgCe0A/mqdefault.jpg",  bg:"#163028"},
  {name:"Arm Swings & Dead Arms",         desc:"Stand upright, twist your torso side-to-side and let your arms swing freely — the Knocking on the Door of Life. Pumps lymph glands at collarbone and armpits.",dur:60,video:"https://www.youtube.com/watch?v=H_smHCBkayA", thumb:"https://img.youtube.com/vi/H_smHCBkayA/mqdefault.jpg", bg:"#2e2218"},
  {name:"Trunk Twists",                   desc:"Bend your torso forward at 45° and twist your waist gently from side to side. Aids lymph flow through the torso and stimulates digestion.",               dur:60,video:"https://www.youtube.com/watch?v=hFteQ6JXoN0",  thumb:"https://img.youtube.com/vi/hFteQ6JXoN0/mqdefault.jpg",  bg:"#1e1a30"},
  {name:"Golf Swings",                    desc:"Gently twist and rotate your core with a cross-body arm movement, mimicking a slow golf swing on both sides. Activates full-body lymphatic flow.",         dur:60,video:"https://www.youtube.com/watch?v=l3c8CYnksNI",  thumb:"https://img.youtube.com/vi/l3c8CYnksNI/mqdefault.jpg",  bg:"#162030"},
  {name:"March & Slap",                   desc:"March in place while gently patting or slapping your arms and legs. This rhythmic action wakes up the nervous system and boosts circulation.",             dur:60,video:"https://www.youtube.com/watch?v=2kAsr4lv_C8",  thumb:"https://img.youtube.com/vi/2kAsr4lv_C8/mqdefault.jpg",  bg:"#301628"},
  {name:"Ballerina Stretch",              desc:"Reach your arms up and gracefully over to the side, stretching the ribcage and sides of the body to open pathways for lymph drainage.",                   dur:60,video:"https://www.youtube.com/watch?v=bYQwM841ED4",  thumb:"https://img.youtube.com/vi/bYQwM841ED4/mqdefault.jpg",  bg:"#183030"}
];

// Working copy — order can change
let EX = EX_BASE.map(e => ({...e}));

// Restore saved state
(function(){
  const saved = JSON.parse(localStorage.getItem('mf4') || 'null');
  if (saved) {
    if (saved.order && saved.order.length === EX_BASE.length) {
      EX = saved.order.map(i => ({...EX_BASE[i]}));
    }
    if (saved.durs) {
      EX.forEach((e, i) => { if (saved.durs[i] !== undefined) e.dur = saved.durs[i]; });
    }
  }
})();

function persist() {
  const order = EX.map(e => EX_BASE.findIndex(b => b.name === e.name));
  const durs = {};
  EX.forEach((e, i) => { durs[i] = e.dur; });
  localStorage.setItem('mf4', JSON.stringify({ order, durs }));
}

/* ═══════════════════════════════════════════
   STATE
═══════════════════════════════════════════ */
let mode = 'list';
let idx = 0;          // always the authoritative current exercise index
let timeLeft = 0, totalDur = 0;
let tmr = null, paused = false;
let editIdx = null;
let wStart = null, done = 0;
let rTmr = null, rLeft = 5;
let audioCtx = null;

const CF = 2 * Math.PI * 38;
const CM = 2 * Math.PI * 28;

/* ═══════════════════════════════════════════
   AUDIO — Web Audio API chime
═══════════════════════════════════════════ */
function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playChime(type = 'next') {
  ensureAudio();
  const ctx = audioCtx;
  const now = ctx.currentTime;

  const notes = type === 'complete'
    ? [523.25, 659.25, 783.99, 1046.5]   // C5 E5 G5 C6 — bright major chord
    : [659.25, 783.99, 1046.5];           // E5 G5 C6 — gentle three-note rise

  notes.forEach((freq, i) => {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(freq, now + i * 0.12);
    gain.gain.setValueAtTime(0, now + i * 0.12);
    gain.gain.linearRampToValueAtTime(0.18, now + i * 0.12 + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.12 + 0.55);
    osc.start(now + i * 0.12);
    osc.stop(now + i * 0.12 + 0.6);
  });
}

function playBeep(type = 'tick') {
  // 3-second countdown beeps during rest
  ensureAudio();
  const ctx = audioCtx;
  const now = ctx.currentTime;
  const freq = type === 'final' ? 880 : 660;
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.connect(gain); gain.connect(ctx.destination);
  osc.type = 'sine';
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(0.12, now);
  gain.gain.exponentialRampToValueAtTime(0.001, now + 0.18);
  osc.start(now); osc.stop(now + 0.2);
}

function showToast(msg) {
  const t = document.getElementById('chimeToast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

/* ═══════════════════════════════════════════
   INIT / HOME
═══════════════════════════════════════════ */
function init() { renderHome(); updateTotal(); }

function setMode(m) {
  mode = m;
  document.getElementById('vtList').classList.toggle('active', m === 'list');
  document.getElementById('vtFocus').classList.toggle('active', m === 'focus');
}

function renderHome() {
  document.getElementById('exerciseList').innerHTML = EX.map((e, i) => `
    <div class="ex-pill" id="pill${i}" draggable="true"
         ondragstart="dragStart(event,${i})" ondragover="dragOver(event,${i})"
         ondragend="dragEnd(event)" ondrop="drop(event,${i})">
      <div class="drag-handle"
           ontouchstart="touchDragStart(event,${i})"
           ontouchmove="touchDragMove(event)"
           ontouchend="touchDragEnd(event)">⠿</div>
      <div class="ex-num">${String(i+1).padStart(2,'0')}</div>
      <div class="ex-info">
        <div class="ex-name">${e.name}</div>
        <div class="ex-dur">${e.dur}s</div>
      </div>
      <div class="ex-actions">
        <button class="icon-btn" onclick="openVideo_i(${i})" title="Watch">▶</button>
        <button class="icon-btn" onclick="openEdit(${i})"   title="Edit">✎</button>
      </div>
    </div>`).join('');
}

function updateTotal() {
  const t = EX.reduce((s, e) => s + e.dur, 0);
  document.getElementById('totalNum').textContent = (t / 60).toFixed(1).replace(/\.0$/, '');
}

/* ═══════════════════════════════════════════
   DRAG-TO-REORDER (mouse/pointer)
═══════════════════════════════════════════ */
let dragSrc = null;

function dragStart(e, i) {
  dragSrc = i;
  e.dataTransfer.effectAllowed = 'move';
  document.getElementById(`pill${i}`).classList.add('dragging');
}
function dragOver(e, i) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  document.querySelectorAll('.ex-pill').forEach(p => p.classList.remove('drag-over'));
  if (i !== dragSrc) document.getElementById(`pill${i}`).classList.add('drag-over');
}
function dragEnd(e) {
  document.querySelectorAll('.ex-pill').forEach(p => {
    p.classList.remove('dragging', 'drag-over');
  });
}
function drop(e, i) {
  e.preventDefault();
  if (dragSrc === null || dragSrc === i) return;
  const moved = EX.splice(dragSrc, 1)[0];
  EX.splice(i, 0, moved);
  dragSrc = null;
  persist();
  renderHome();
  updateTotal();
}

/* ═══════════════════════════════════════════
   TOUCH DRAG (iOS)
═══════════════════════════════════════════ */
let touchDragIdx = null, touchClone = null, touchStartY = 0;

function touchDragStart(e, i) {
  e.stopPropagation();
  touchDragIdx = i;
  touchStartY = e.touches[0].clientY;
  const pill = document.getElementById(`pill${i}`);
  const rect = pill.getBoundingClientRect();

  touchClone = pill.cloneNode(true);
  touchClone.style.cssText = `position:fixed;left:${rect.left}px;top:${rect.top}px;width:${rect.width}px;opacity:.85;pointer-events:none;z-index:999;transition:none;border-radius:13px;background:rgba(255,255,255,.9)`;
  document.body.appendChild(touchClone);
  pill.classList.add('dragging');
}

function touchDragMove(e) {
  if (touchDragIdx === null || !touchClone) return;
  e.preventDefault();
  const dy = e.touches[0].clientY - touchStartY;
  const origPill = document.getElementById(`pill${touchDragIdx}`);
  if (!origPill) return;
  const rect = origPill.getBoundingClientRect();
  touchClone.style.top = (rect.top + dy) + 'px';

  // Find which pill we're hovering over
  const x = e.touches[0].clientX, y = e.touches[0].clientY;
  document.querySelectorAll('.ex-pill').forEach((p, j) => {
    p.classList.remove('drag-over');
    const r = p.getBoundingClientRect();
    if (y >= r.top && y <= r.bottom && j !== touchDragIdx) p.classList.add('drag-over');
  });
}

function touchDragEnd(e) {
  if (touchDragIdx === null) return;
  // Find drop target
  let dropIdx = null;
  document.querySelectorAll('.ex-pill').forEach((p, j) => {
    if (p.classList.contains('drag-over')) { dropIdx = j; }
    p.classList.remove('drag-over', 'dragging');
  });
  if (touchClone) { touchClone.remove(); touchClone = null; }
  if (dropIdx !== null && dropIdx !== touchDragIdx) {
    const moved = EX.splice(touchDragIdx, 1)[0];
    EX.splice(dropIdx, 0, moved);
    persist();
    renderHome();
    updateTotal();
  }
  touchDragIdx = null;
}

/* ═══════════════════════════════════════════
   START
═══════════════════════════════════════════ */
function startWorkout() {
  ensureAudio(); // unlock audio on user gesture
  idx = 0; done = 0; wStart = Date.now();
  if (mode === 'focus') {
    showScreen('workout-focus');
    buildDots();
    loadFocus(0);
  } else {
    showScreen('workout-list');
    buildListCards();
    activateList(0);
  }
}

/* ═══════════════════════════════════════════
   LIST MODE
═══════════════════════════════════════════ */
function buildListCards() {
  document.getElementById('wlScroll').innerHTML = EX.map((e, i) => `
    <div class="wl-card" id="wlC${i}">
      <div class="wl-card-header">
        <div class="wl-num">${String(i+1).padStart(2,'0')}</div>
        <div class="wl-info">
          <div class="wl-name">${e.name}</div>
          <div class="wl-dur">${e.dur}s</div>
        </div>
      </div>
      <div class="wl-timer">
        <div class="mini-ring-wrap">
          <div class="mini-ring">
            <svg width="68" height="68" viewBox="0 0 68 68" style="transform:rotate(-90deg)">
              <circle fill="none" stroke="rgba(138,171,138,.15)" stroke-width="6" cx="34" cy="34" r="28"/>
              <circle id="mR${i}" fill="none" stroke="#4a7a4a" stroke-width="6" stroke-linecap="round" cx="34" cy="34" r="28"/>
            </svg>
            <div class="mini-ring-num"><span id="mT${i}">${e.dur}</span><small>sec</small></div>
          </div>
          <div class="mini-controls">
            <div class="mini-ctrl-row">
              <button class="mini-btn mb-pause" id="mP${i}" onclick="toggleListPause()">Pause</button>
              <button class="mini-btn mb-next"  onclick="listNext()">Next →</button>
            </div>
            <div class="mini-ctrl-row">
              <button class="mini-btn mb-video" onclick="openVideo_i(${i})">▶ Watch video</button>
              <button class="mini-btn mb-skip"  onclick="listSkip()">Skip</button>
            </div>
            <div class="wl-desc">${e.desc}</div>
          </div>
        </div>
      </div>
    </div>`).join('');
}

function activateList(i) {
  idx = i; // ← fix: keep idx in sync
  document.querySelectorAll('.wl-card').forEach((c, j) => {
    c.classList.remove('active-ex');
    j < i ? c.classList.add('done-ex') : c.classList.remove('done-ex');
  });
  const card = document.getElementById(`wlC${i}`);
  if (!card) return;
  card.classList.remove('done-ex');
  card.classList.add('active-ex');
  card.scrollIntoView({ behavior: 'smooth', block: 'start' });

  document.getElementById('wlProg').textContent = `${i + 1} of ${EX.length}`;
  document.getElementById('wlFill').style.width = `${(i / EX.length) * 100}%`;

  clearInterval(tmr);
  paused = false;
  document.getElementById(`mP${i}`).textContent = 'Pause';

  const e = EX[i];
  timeLeft = e.dur;
  totalDur = e.dur;
  setMR(i, 1);
  document.getElementById(`mT${i}`).textContent = timeLeft;

  tmr = setInterval(() => {
    if (paused) return;
    timeLeft--;
    document.getElementById(`mT${i}`).textContent = timeLeft;
    setMR(i, timeLeft / totalDur);
    if (timeLeft <= 0) {
      clearInterval(tmr);
      done++;
      if (i < EX.length - 1) showRest(i);
      else showComplete();
    }
  }, 1000);
}

function setMR(i, f) {
  const r = document.getElementById(`mR${i}`);
  if (!r) return;
  r.style.strokeDasharray = CM;
  r.style.strokeDashoffset = CM * (1 - Math.max(0, f));
}

function toggleListPause() {
  paused = !paused;
  const btn = document.getElementById(`mP${idx}`);
  if (btn) btn.textContent = paused ? 'Resume' : 'Pause';
}

function listNext() {
  clearInterval(tmr);
  done++;
  idx < EX.length - 1 ? showRest(idx) : showComplete();
}

function listSkip() {
  clearInterval(tmr);
  if (idx < EX.length - 1) { idx++; activateList(idx); }
  else showComplete();
}

/* ═══════════════════════════════════════════
   VOICEOVER — Web Speech API
═══════════════════════════════════════════ */
let voEnabled = false;
let voUtterance = null;

function toggleVoiceover() {
  voEnabled = !voEnabled;
  const btn = document.getElementById('voBtn');
  const icon = document.getElementById('voIcon');
  const label = document.getElementById('voBtnLabel');
  if (voEnabled) {
    btn.classList.add('vo-on');
    icon.textContent = '🔊';
    label.textContent = 'Voiceover';
    // speak the current exercise immediately if we're mid-workout
    if (document.getElementById('workout-focus').classList.contains('active')) {
      speakExercise(idx);
    }
  } else {
    btn.classList.remove('vo-on');
    icon.textContent = '🔇';
    label.textContent = 'Voiceover';
    stopSpeech();
  }
}

function speakExercise(i) {
  if (!voEnabled || !window.speechSynthesis) return;
  stopSpeech();
  const e = EX[i];
  const text = `Exercise ${i + 1}. ${e.name}. ${e.desc}`;
  voUtterance = new SpeechSynthesisUtterance(text);
  voUtterance.rate = 0.92;
  voUtterance.pitch = 1.0;
  voUtterance.volume = 1.0;
  // prefer a natural English voice if available
  const voices = speechSynthesis.getVoices();
  const preferred = voices.find(v => v.lang.startsWith('en') && v.name.toLowerCase().includes('samantha'))
    || voices.find(v => v.lang.startsWith('en') && !v.name.toLowerCase().includes('compact'))
    || voices.find(v => v.lang.startsWith('en'));
  if (preferred) voUtterance.voice = preferred;

  // animate desc while speaking
  voUtterance.onstart = () => document.getElementById('focusDesc').classList.add('vo-speaking');
  voUtterance.onend   = () => document.getElementById('focusDesc').classList.remove('vo-speaking');
  voUtterance.onerror = () => document.getElementById('focusDesc').classList.remove('vo-speaking');

  speechSynthesis.speak(voUtterance);
}

function stopSpeech() {
  if (window.speechSynthesis) {
    speechSynthesis.cancel();
  }
  document.getElementById('focusDesc').classList.remove('vo-speaking');
}

function pauseSpeech() {
  if (window.speechSynthesis && speechSynthesis.speaking) speechSynthesis.pause();
}

function resumeSpeech() {
  if (window.speechSynthesis && speechSynthesis.paused) speechSynthesis.resume();
  // if speech already finished but user unpauses, re-speak
  else if (voEnabled && !speechSynthesis.speaking) speakExercise(idx);
}

/* ═══════════════════════════════════════════
   FOCUS MODE
═══════════════════════════════════════════ */
function buildDots() {
  document.getElementById('dotProg').innerHTML =
    EX.map((_, i) => `<div class="dot" id="dot${i}"></div>`).join('');
}

function loadFocus(i) {
  idx = i; // ← keep idx in sync
  clearInterval(tmr);
  paused = false;
  const e = EX[i];
  document.getElementById('focusName').textContent     = e.name;
  document.getElementById('focusDesc').textContent     = e.desc;
  document.getElementById('focusPLabel').textContent   = `${i + 1} of ${EX.length}`;
  document.getElementById('focusPauseBtn').textContent = 'Pause';
  document.getElementById('videoThumb').style.backgroundImage = `url(${e.thumb})`;
  document.getElementById('focusTop').style.background        = e.bg;

  const nx = EX[i + 1];
  document.getElementById('focusUpNext').style.opacity = nx ? '1' : '0';
  if (nx) document.getElementById('focusUpNextName').textContent = nx.name;

  document.querySelectorAll('.dot').forEach((d, j) => {
    d.classList.remove('current', 'done');
    if (j < i) d.classList.add('done');
    if (j === i) d.classList.add('current');
  });

  timeLeft = e.dur;
  totalDur = e.dur;
  setFR(1);
  document.getElementById('focusTime').textContent = timeLeft;

  // speak after a brief pause so the chime plays first
  setTimeout(() => speakExercise(i), 400);

  tmr = setInterval(() => {
    if (paused) return;
    timeLeft--;
    document.getElementById('focusTime').textContent = timeLeft;
    setFR(timeLeft / totalDur);
    if (timeLeft <= 0) {
      clearInterval(tmr);
      done++;
      if (i < EX.length - 1) showRest(i);
      else showComplete();
    }
  }, 1000);
}

function setFR(f) {
  const r = document.getElementById('focusRing');
  r.style.strokeDasharray  = CF;
  r.style.strokeDashoffset = CF * (1 - Math.max(0, f));
}

function toggleFocusPause() {
  paused = !paused;
  document.getElementById('focusPauseBtn').textContent = paused ? 'Resume' : 'Pause';
  paused ? pauseSpeech() : resumeSpeech();
}

function focusNext() {
  clearInterval(tmr);
  done++;
  idx < EX.length - 1 ? showRest(idx) : showComplete();
}

function focusSkip() {
  clearInterval(tmr);
  if (idx < EX.length - 1) loadFocus(idx + 1);
  else showComplete();
}

/* ═══════════════════════════════════════════
   REST
═══════════════════════════════════════════ */
function showRest(from) {
  const nx = EX[from + 1];
  document.getElementById('restNext').textContent = `Next: ${nx ? nx.name : '—'}`;
  rLeft = 5;
  document.getElementById('restCount').textContent = rLeft;
  document.getElementById('restOverlay').classList.add('open');

  // Chime + toast when exercise ends
  stopSpeech();
  playChime('next');
  showToast(`Up next: ${nx ? nx.name : 'last one!'}`);

  rTmr = setInterval(() => {
    rLeft--;
    document.getElementById('restCount').textContent = rLeft;
    if (rLeft <= 3 && rLeft > 0) playBeep('tick');
    if (rLeft === 0) playBeep('final');
    if (rLeft <= 0) {
      clearInterval(rTmr);
      document.getElementById('restOverlay').classList.remove('open');
      const next = from + 1;
      mode === 'focus' ? loadFocus(next) : activateList(next);
    }
  }, 1000);
}

function skipRest() {
  clearInterval(rTmr);
  document.getElementById('restOverlay').classList.remove('open');
  const next = idx + 1;
  mode === 'focus' ? loadFocus(next) : activateList(next);
}

/* ═══════════════════════════════════════════
   VIDEO
═══════════════════════════════════════════ */
function openVideo()    { openVideo_i(idx); }
function openVideo_i(i) { window.open(EX[i].video, '_blank'); }

/* ═══════════════════════════════════════════
   COMPLETE
═══════════════════════════════════════════ */
function showComplete() {
  clearInterval(tmr);
  playChime('complete');
  const el = Math.round((Date.now() - wStart) / 60000);
  document.getElementById('statEx').textContent  = done;
  document.getElementById('statMin').textContent = el || Math.round(EX.reduce((s, e) => s + e.dur, 0) / 60);
  showScreen('complete');
}

function endWorkout() {
  clearInterval(tmr);
  clearInterval(rTmr);
  stopSpeech();
  document.getElementById('restOverlay').classList.remove('open');
  goHome();
}

function goHome() {
  stopSpeech();
  renderHome();
  updateTotal();
  showScreen('home');
}

/* ═══════════════════════════════════════════
   EDIT MODAL
═══════════════════════════════════════════ */
function openEdit(i) {
  editIdx = i;
  document.getElementById('editTitle').textContent = EX[i].name;
  document.getElementById('editDur').value = EX[i].dur;
  document.getElementById('editModal').classList.add('open');
}
function closeModal() { document.getElementById('editModal').classList.remove('open'); }
function saveModal() {
  const v = parseInt(document.getElementById('editDur').value);
  if (!isNaN(v) && v >= 10) {
    EX[editIdx].dur = v;
    persist();
    renderHome();
    updateTotal();
  }
  closeModal();
}
document.getElementById('editModal').addEventListener('click', e => {
  if (e.target === document.getElementById('editModal')) closeModal();
});

/* ═══════════════════════════════════════════
   SCREEN NAV
═══════════════════════════════════════════ */
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

init();
</script>
